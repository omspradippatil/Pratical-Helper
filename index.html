<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assets Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

    <header class="hero">
      <p class="eyebrow">Strict HTML + Vanilla JS</p>
      <h1>Assets Explorer</h1>
      <p class="hero-copy">
        Every file inside <strong>assets</strong> is discovered recursively, including nested folders.
      </p>
    </header>

    <main class="layout">
      <section class="toolbar" aria-label="Controls">
        <div class="toolbar-left">
          <button id="reloadButton" type="button">Refresh Files</button>
          <p id="stats" class="stats">Loading files...</p>
        </div>
        <label class="search-wrap" for="searchInput">
          <span>Filter</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Type part of a filename or folder"
            autocomplete="off"
          />
        </label>
      </section>

      <section>
        <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
        <div id="assetsGrid" class="assets-grid" aria-live="polite"></div>
      </section>
    </main>

    <template id="assetCardTemplate">
      <article class="asset-card">
        <header class="asset-card-header">
          <p class="asset-folder"></p>
          <p class="asset-ext"></p>
        </header>
        <h2 class="asset-name">
          <a class="asset-name-link" target="_blank" rel="noopener noreferrer"></a>
        </h2>
        <div class="asset-preview"></div>
        <footer class="asset-card-footer">
          <small class="asset-size"></small>
          <div class="asset-actions">
            <button class="asset-preview-toggle" type="button" aria-expanded="false">Show Preview</button>
            <a class="asset-open" target="_blank" rel="noopener noreferrer">Open</a>
            <a class="asset-download" download>Download</a>
          </div>
        </footer>
      </article>
    </template>

    <script src="script.js" defer></script>
  </body>
</html>
