<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practical 4 - Student Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    table {
      border-collapse: collapse;
      width: 70%;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #d9ead3;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    tr:nth-child(odd) {
      background-color: #fff;
    }
  </style>
</head>
<body>
  <h2>Practical 4: 10 Students in Table</h2>

  <table>
    <thead>
      <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Marks</th>
      </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>

  <script>
    const students = [
      { roll: 1, name: "Amit", marks: 80 },
      { roll: 2, name: "Pooja", marks: 82 },
      { roll: 3, name: "Rahul", marks: 77 },
      { roll: 4, name: "Sneha", marks: 91 },
      { roll: 5, name: "Kiran", marks: 73 },
      { roll: 6, name: "Neha", marks: 85 },
      { roll: 7, name: "Rohit", marks: 79 },
      { roll: 8, name: "Anita", marks: 88 },
      { roll: 9, name: "Vijay", marks: 76 },
      { roll: 10, name: "Meena", marks: 90 }
    ];

    const tableBody = document.getElementById("studentTable");
    students.forEach(function(student) {
      const row = document.createElement("tr");
      row.innerHTML =
        "<td>" + student.roll + "</td>" +
        "<td>" + student.name + "</td>" +
        "<td>" + student.marks + "</td>";
      tableBody.appendChild(row);
    });
  </script>
</body>
</html>
