<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practical 2 - Full Name</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #fffdf6;
    }
    .panel {
      max-width: 420px;
      border: 1px solid #e7dcc2;
      border-radius: 8px;
      padding: 16px;
      background: #ffffff;
    }
    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: 1px solid #d6c8a6;
      border-radius: 4px;
      background: #f8edd2;
      cursor: pointer;
    }
    #output {
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h2>Practical 2: First Name + Last Name</h2>
    <p>Combine object properties to build a full name string.</p>
    <div id="output">Click the button to generate full name.</div>
    <button onclick="showFullName()">Show Full Name</button>
  </div>

  <script>
    const person = {
      firstName: "Asha",
      lastName: "Patel"
    };

    function showFullName() {
      const fullName = person.firstName + " " + person.lastName;
      const initials = person.firstName[0] + person.lastName[0];
      document.getElementById("output").innerHTML =
        "Full Name: " + fullName + "<br>" +
        "Initials: " + initials.toUpperCase();
    }
  </script>
</body>
</html>
