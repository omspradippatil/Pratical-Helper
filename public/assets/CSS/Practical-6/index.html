<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practical 6 - React useState Color Change</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .box {
      width: 220px;
      height: 120px;
      border: 2px solid #333;
      margin-bottom: 10px;
      transition: background-color 0.3s ease;
    }
    button {
      padding: 8px 12px;
    }
  </style>
</head>
<body>
  <h2>Practical 6: React useState - Change Div Background</h2>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    function ColorChanger() {
      const [isBlue, setIsBlue] = React.useState(true);

      function changeColor() {
        setIsBlue(!isBlue);
      }

      return (
        <div>
          <div className="box" style={{ backgroundColor: isBlue ? "skyblue" : "lightgreen" }}></div>
          <button onClick={changeColor}>Change Color</button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ColorChanger />);
  </script>
</body>
</html>
